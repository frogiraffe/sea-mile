name: Refresh bundled registry data

on:
  schedule:
    - cron: "0 6 1 * *" # 06:00 UTC on the 1st of every month
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Record the currently bundled registry hash
        id: before
        run: |
          echo "hash=$(jq -r .registry_content_hash src/sea_mile/data/registry_manifest.json)" >> "$GITHUB_OUTPUT"

      - name: Download WPI + GeoNames source snapshots
        run: uv run sea-mile data download --reference-root data/reference --refresh

      - name: Rebuild the bundled registry
        run: uv run python scripts/build_bundled_registry.py data/reference

      - name: Check whether the registry content actually changed
        id: diff
        run: |
          new_hash=$(jq -r .registry_content_hash src/sea_mile/data/registry_manifest.json)
          echo "hash=$new_hash" >> "$GITHUB_OUTPUT"
          if [ "$new_hash" = "${{ steps.before.outputs.hash }}" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "registry_content_hash unchanged ($new_hash); the manifest's snapshot_label/path/sha256 fields still shift with today's date even when the port data itself doesn't, so those get discarded below."
            git checkout -- src/sea_mile/data
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "registry_content_hash changed: ${{ steps.before.outputs.hash }} -> $new_hash"
          fi

      - name: Open a PR with the refreshed data
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          branch="refresh-bundled-data"
          git checkout -B "$branch"
          git add src/sea_mile/data
          git commit -m "Refresh bundled WPI + GeoNames registry data"
          git push --force origin "$branch"
          if [ "$(gh pr view "$branch" --json state -q .state 2>/dev/null)" = "OPEN" ]; then
            echo "PR for $branch is already open; the push above updated it"
          else
            gh pr create \
              --title "Refresh bundled registry data" \
              --body "Automated refresh of the WPI + GeoNames registry bundled in the wheel (\`scripts/build_bundled_registry.py\`). registry_content_hash: \`${{ steps.before.outputs.hash }}\` -> \`${{ steps.diff.outputs.hash }}\`. Review the diff in \`src/sea_mile/data/\` before merging, and bump the package version as part of the merge." \
              --base main \
              --head "$branch"
          fi
