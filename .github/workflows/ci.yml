name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.11", "3.12", "3.13"]
        include:
          - os: macos-latest
            python-version: "3.13"
          - os: windows-latest
            python-version: "3.13"
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --dev --extra analysis --extra fast --extra tui --extra routing --python ${{ matrix.python-version }}

      - name: Ruff format check
        run: uv run ruff format --check src tests scripts

      - name: Ruff lint
        run: uv run ruff check src tests scripts

      # numpy's stubs use PEP 695 syntax, which mypy only parses when the
      # checking interpreter is 3.12+, so type-check once on the newest cell.
      - name: Mypy
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.13'
        run: uv run mypy src

      - name: Run tests
        run: uv run pytest -q

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: "latest"

      - name: Build sdist and wheel
        run: uv build

      - name: Smoke-test the core-only wheel
        run: |
          python3 -m venv /tmp/sea-mile-ci-smoke
          source /tmp/sea-mile-ci-smoke/bin/activate
          pip install --quiet dist/*.whl
          sea-mile --help
          python3 -c "from sea_mile import PortRegistry, SeaRouter"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dist
          path: dist/
